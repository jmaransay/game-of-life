language: java
jdk:
- oraclejdk8
- oraclejdk9
- openjdk8
matrix:
  allow_failures:
  - jdk: oraclejdk9
install:
- sudo apt-get install -y nmap
- sudo add-apt-repository -y ppa:cpick/hub
- sudo apt-get update
script:
- mvn test -B
- cd gameoflife-web
- mvn package
after_success:
- mvn clean test jacoco:report coveralls:report
deploy:
  provider: heroku
  api_key:
    secure: 
  app: jmaransay-game-of-life
  jdk: openjdk8 
  skip_cleanup: true
